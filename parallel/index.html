<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Concurrency, IPC & Networking Quiz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>C++ Concurrency, IPC &amp; Networking Review</h1>
        </header>

        <div id="startScreen">
            <div class="start-card">
                <h2>Quiz Settings</h2>
                <p>Choose how you want the questions to appear:</p>
                <div class="start-options">
                    <button class="start-btn" onclick="startQuiz(false)">&#128221; In Order</button>
                    <button class="start-btn shuffle" onclick="startQuiz(true)">&#127922; Shuffle Questions</button>
                </div>
                <div class="mode-section">
                    <p>Display mode:</p>
                    <div class="start-options">
                        <button class="mode-btn active" id="modeOneBtn" onclick="setMode('one')">One per page</button>
                        <button class="mode-btn" id="modeAllBtn" onclick="setMode('all')">All on one page</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="quizContainer" class="hidden">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p class="progress-text" id="progressText">Question 1 of 35</p>
            <div class="question-card" id="questionCard">
                <h2 class="question-number" id="questionNumber">Question 1</h2>
                <p class="question-text" id="questionText"></p>
                <div class="options" id="optionsContainer"></div>
                <div class="feedback" id="feedback"></div>
                <div class="explanation" id="explanation"></div>
            </div>
            <div class="nav-buttons">
                <button id="prevBtn" onclick="prevQuestion()" disabled>&#8592; Previous</button>
                <button id="nextBtn" onclick="nextQuestion()" disabled>Next &#8594;</button>
            </div>
        </div>

        <div id="allQuestionsContainer" class="hidden">
            <div class="all-questions-header">
                <p class="all-progress-text" id="allProgressText">0 of 0 answered</p>
                <button class="submit-all-btn" id="submitAllBtn" onclick="submitAll()" disabled>Submit All &amp; See Results</button>
            </div>
            <div id="allQuestionsList"></div>
        </div>

        <div id="resultsContainer" class="hidden">
            <div class="results-card">
                <h2>Quiz Complete!</h2>
                <div class="score" id="scoreDisplay"></div>
                <p class="score-message" id="scoreMessage"></p>
                <button class="restart-btn" onclick="restartQuiz()">Restart Quiz</button>
            </div>
            <div class="summary-section">
                <h3>Question Summary</h3>
                <div id="summaryList"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
